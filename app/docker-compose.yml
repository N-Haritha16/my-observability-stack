# app/docker-compose.yml
version: "3.8"

services:
  flask-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flask-app
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: development
      APP_PORT: "5000"
    command: ["python", "app.py"]
    logging:
      driver: "json-file"